<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Mobilitätsvergleich</title>

  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: 'Roboto', Arial, sans-serif;
      background: #000;
    }

    #app {
      display: grid;
      grid-template-columns: 380px 1fr;
      height: 100%;
    }

    #panel {
      background: #000;
      color: #fff;
      border-right: 1px solid #222;
      overflow: auto;
    }

    /* 👉 WICHTIG: echter Abstand */
    #panelInner {
      padding: 40px 12px 40px 12px;
      box-sizing: border-box;
      min-height: 100%;
    }

    #map {
      height: 100%;
      width: 100%;
    }

    h2 {
      margin: 0 0 10px 0;
      font-size: 24px;
      font-weight: 900;
    }

    .small {
      font-size: 13px;
      color: #bbb;
    }

    .box {
      background: #111;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 12px;
      margin-top: 12px;
    }

    .wizardQ {
      font-size: 24px;
      font-weight: 900;
      line-height: 1.2;
    }

    .wizardSub {
      font-size: 13px;
      color: #bbb;
      margin-top: 5px;
    }

    .buttonRow {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .timeGrid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    button {
      width: 100%;
      padding: 16px;
      font-size: 18px;
      font-weight: 700;
      border-radius: 12px;
      border: 1px solid #555;
      background: #222;
      color: #fff;
      cursor: pointer;
    }

    button.primary {
      background: #444;
      font-weight: 900;
    }

    button.active {
      outline: 2px solid rgba(255,255,255,0.4);
    }

    .hidden {
      display: none !important;
    }

    .warn {
      color: #ff998a;
      margin-top: 10px;
      font-size: 13px;
    }

    .infoTextLarge {
      font-size: 22px;
      line-height: 1.6;
    }
  </style>
</head>

<body>
<div id="app">

  <div id="panel">
    <div id="panelInner">

      <h2>Vergleiche Deinen Mobilitätsradius mit früher!</h2>

      <div class="box">
        <div class="wizardQ" id="prompt">Wo wohnst du? KLICK</div>
        <div class="wizardSub" id="progress"></div>

        <div class="buttonRow">
          <button id="back">Zurück</button>
          <button class="primary" id="restart">Neu starten</button>
        </div>
      </div>

      <div id="compareSection" class="box hidden">
        <div class="wizardQ" id="compareHeadline">Zeitvergleich</div>
        <div class="small" id="compareSub">Wähle einen historischen Zeitschnitt.</div>

        <div class="timeGrid">
          <button class="timeBtn" data-year="1590">1590</button>
          <button class="timeBtn" data-year="1790">1790</button>
          <button class="timeBtn" data-year="1890">1890</button>
          <button class="timeBtn" data-year="1950">1950</button>
        </div>

        <div class="box">
          <div class="infoTextLarge" id="infoText">
            Hier Infos zum heutigen Radius...
          </div>
        </div>

        <button class="primary" id="nextTopic">Weiter zum nächsten Thema</button>
      </div>

      <div id="doneSection" class="box hidden">
        <div class="wizardQ">Fertig!</div>
        <div class="small">
          Alle Themen wurden durchlaufen.
        </div>
      </div>

      <div class="warn" id="err"></div>

    </div>
  </div>

  <div id="map"></div>

</div>

<script>
/* 👉 dein kompletter bestehender JS-Code bleibt UNVERÄNDERT */
</script>

</body>
</html>
